<body>
    <a href = "index.html">index.html</a>
    <a href = "geometron.html">geometron.html</a>
    <h1>Geometron Glyph Feed</h1>
    <table>
        <tr>
            <td>current glyph name:</td>
            <td>
                <input id = "glyph-name-input">
            </td>
        </tr>
        <tr>
            <td>new glyph name:</td>
            <td>
                <input id = "glyph-name-input">
            </td>
        </tr>
        <tr>
            <td>markdown code:</td>
            <td>
                <input id = "markdown-code-input">
            </td>
        </tr>
    </table>
    <div id = "geometron-glyph-feed"></div>
</body>
<script>
document.getElementById("glyph-name-input").value = "";
fetch('list-files.php')
    .then(xhr => xhr.json())
    .then(files => {
        for (var index = 0; index < files.length; index++) {
            if (files[index].endsWith(".svg")) {
            
                let newImageBox = document.createElement("DIV");
                newImageBox.className = "image-box";
                let newImg = document.createElement("IMG");
                newImg.src = files[index]; 
                newImg.onclick = function(){
                    let glyphFileName = this.src.split('/').pop();
                    document.getElementById("glyph-name-input").value = glyphFileName;
                    document.getElementById("markdown-code-input").value = "![](" + glyphFileName + ")";
                }
                let newDeleteButton = document.createElement("SPAN");
                newDeleteButton.innerHTML = "DELETE GLYPH";
                newDeleteButton.className = "delete-button";
                newDeleteButton.onclick = function(){
                    
                }
                newImageBox.appendChild(newImg);
                newImageBox.appendChild(newDeleteButton);
                document.getElementById("geometron-glyph-feed").appendChild(newImageBox);
            }
        }
    });    
</script>

    body{

        width:12 em;

    }
    .delete-button:hover{
        background-color:yellow;
    }
    .delete-button:active{
        background-color:green;
    }
    
</style>
